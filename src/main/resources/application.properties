spring.application.name=blackjack

# Configuració de MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/blackjack
spring.data.mongodb.database=blackjack

# Configuració de R2DBC per a MySQL
spring.r2dbc.url=r2dbc:mysql://localhost:3306/blackjack
spring.r2dbc.username=root
spring.r2dbc.password=
spring.sql.init.mode=always
spring.sql.init.platform=mysql

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.display-request-duration=true

# Configuració del registre
logging.level.root=INFO
logging.level.cat.itacademy.s05.t01.n01.blackjack=DEBUG
logging.file.name=app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n






