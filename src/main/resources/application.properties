spring.application.name=blackjack

# Configuraciˇ de MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/blackjack
spring.dat.mongodb.database=blackjack

# Configuraciˇ de R2DBC per a MySQL
spring.r2dbc.url=r2dbc:mysql://localhost:3306/blackjack
spring.r2dbc.username=root
spring.r2dbc.password=

server.port=8080

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.display-request-duration=true





